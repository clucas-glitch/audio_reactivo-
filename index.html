<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Reactor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Canvas de fondo reactivo -->
  <canvas id="bg-canvas"></canvas>
  <!-- Fondo blur de color -->
  <div id="bg-blur"></div>

  <main class="stage">

    <section class="carousel" id="carousel">

      <!-- CANCIÓN 1: KISS -->
      <div class="card" data-index="0" data-song="kiss">
        <div class="card-inner">
          <img class="card-art" src="img/kiss.jpg" alt="Kiss" />
          <canvas class="card-canvas" id="canvas-0"></canvas>
          <div class="card-overlay">
            <p class="card-title">I Was Made For Lovin' You</p>
            <p class="card-artist">KISS</p>
          </div>
          <div class="hold-hint">
            <!-- Ícono play SVG custom -->
            <svg class="hold-icon-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2" opacity="0.6"/>
              <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2" stroke-dasharray="176" stroke-dashoffset="176" class="hint-ring"/>
              <polygon points="24,18 44,30 24,42" fill="white"/>
            </svg>
            <span>Mantén presionado</span>
          </div>
        </div>
      </div>

      <!-- CANCIÓN 2: LOCOS -->
      <div class="card" data-index="1" data-song="leon">
        <div class="card-inner">
          <img class="card-art" src="img/leon.jpg" alt="León Larregui - Locos" />
          <canvas class="card-canvas" id="canvas-1"></canvas>
          <div class="card-overlay">
            <p class="card-title">Locos</p>
            <p class="card-artist">León Larregui</p>
          </div>
          <div class="hold-hint">
            <svg class="hold-icon-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2" opacity="0.6"/>
              <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2" stroke-dasharray="176" stroke-dashoffset="176" class="hint-ring"/>
              <polygon points="24,18 44,30 24,42" fill="white"/>
            </svg>
            <span>Mantén presionado</span>
          </div>
        </div>
      </div>

    </section>

    <!-- ── BARRA PLAYER CENTRADA ── -->
    <nav class="player-bar" id="player-bar">

      <!-- Miniatura + info -->
      <div class="now-playing" id="now-playing">
        <img class="np-thumb" id="np-thumb" src="img/kiss.jpg" alt="portada" />
        <div class="np-info">
          <span class="np-title" id="np-title">I Was Made For Lovin' You</span>
          <span class="np-artist" id="np-artist">KISS</span>
        </div>
      </div>

      <!-- Controles centrales -->
      <div class="controls">

        <!-- Anterior -->
        <button class="nav-btn" id="btn-prev" title="Anterior">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="7" width="3" height="18" rx="1.5" fill="currentColor"/>
            <path d="M26 7L12 16L26 25V7Z" fill="currentColor"/>
          </svg>
        </button>

        <!-- Play / Pause -->
        <button class="nav-btn play-btn" id="btn-play" title="Play/Pause">
          <!-- Estado PLAY -->
          <svg class="icon-play" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="14" fill="white"/>
            <polygon points="13,10 23,16 13,22" fill="#111"/>
          </svg>
          <!-- Estado PAUSE (oculto por defecto) -->
          <svg class="icon-pause" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
            <circle cx="16" cy="16" r="14" fill="white"/>
            <rect x="11" y="10" width="3.5" height="12" rx="1.5" fill="#111"/>
            <rect x="17.5" y="10" width="3.5" height="12" rx="1.5" fill="#111"/>
          </svg>
        </button>

        <!-- Siguiente -->
        <button class="nav-btn" id="btn-next" title="Siguiente">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="23" y="7" width="3" height="18" rx="1.5" fill="currentColor"/>
            <path d="M6 7L20 16L6 25V7Z" fill="currentColor"/>
          </svg>
        </button>

      </div>

      <!-- Volumen -->
      <div class="volume-wrap">
        <!-- Ícono volumen SVG -->
        <svg viewBox="0 0 24 24" fill="none" class="vol-icon" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" opacity="0.7"/>
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.74 2.5-2.26 2.5-4.03z" fill="currentColor" opacity="0.7"/>
          <path d="M19 12c0 2.93-1.6 5.5-4 6.93v-2.16c1.48-1.17 2.5-2.93 2.5-4.77 0-1.84-1.02-3.6-2.5-4.77V5.07C17.4 6.5 19 9.07 19 12z" fill="currentColor" opacity="0.5"/>
        </svg>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" />
      </div>

      <!-- Dots indicadores -->
      <div class="nav-dots">
        <span class="dot active" data-dot="0"></span>
        <span class="dot" data-dot="1"></span>
      </div>

    </nav>

  </main>

  <script src="js/AudioEngine.js"></script>
  <script src="js/visualizers/BarsVisualizer.js"></script>
  <script src="js/visualizers/WaveVisualizer.js"></script>
  <script src="js/Navigator.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
